name = "morning-surf-f117"
main = "cloudflare-worker.js"
compatibility_date = "2025-12-05"

[limits]
cpu_ms = 30000

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "law-embeddings"

[[r2_buckets]]
binding = "R2"
bucket_name = "joubun-kun-data"
preview_bucket_name = "joubun-kun-data"

